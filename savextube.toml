# SaveXTube 完整配置文件
# 创建文件时，若需要保留中文注释，请务必确保本文件编码为 UTF-8，否则会无法读取。

[telegram]
# Telegram Bot 配置
telegram_bot_token = "xxx" # 核心配置，必选项，操作telegram机器人必须配置的参数
telegram_bot_api_id = "xxx" # 只有需要使用 telegram 保存视频才需要配置
telegram_bot_api_hash = "xxx" # 只有需要使用 telegram 保存视频才需要配置
telegram_bot_allowed_user_ids = "xxx" # 允许操作telegram机器人的telegram用户，不填写任何人只要知道你telegram机器人名称，都可以给你机器人发链接下载

[proxy]
# 代理服务器配置
#proxy_host = "http://192.168.2.1:7890"

[netease]
# 网易云音乐配置
ncm_quality_level = "无损"
ncm_download_lyrics = true
ncm_dir_format = "{ArtistName}/{AlbumName}"
ncm_album_folder_format = "{AlbumName}({ReleaseDate})"
ncm_song_file_format = "{SongName}"

[apple_music]
# Apple Music 配置
amdp = true
amd_wrapper_decrypt = "192.168.2.134:10020"
amd_wrapper_get = "192.168.2.134:20020"
amd_region = "cn"

[bilibili]
# Bilibili 配置
bilibili_poll_interval = 1

[qbittorrent]
# qBittorrent 连接配置
qb_host = "192.168.2.134"
qb_port = 8988
qb_username = "admin"
qb_password = "xxx"

[logging]
# 日志配置
log_level = "INFO"
log_dir = "/app/logs"
log_max_size = 10
log_backup_count = 5
log_to_console = true
log_to_file = true

[youtube]
# YouTube 配置
youtube_convert_to_mp4 = true

[multithread]
# 多线程下载配置
# 单个文件的下载线程数（推荐 8-32）
mt_file_threads = 16
# 同时下载的文件数量（推荐 2-5）
mt_concurrent_files = 3
# 是否使用 aria2c 加速器（true/false）
mt_use_aria2c = true
# aria2c 服务器连接数（推荐 8-16）
mt_aria2c_connections = 16
# 每个服务器的分片数（推荐 8-16）
mt_aria2c_splits = 16
# 下载速度限制（0 表示不限制），格式：500K, 1M, 10M
mt_speed_limit = "0"

[download_queue]
# 下载队列配置
# URL 下载最大并发数（推荐 2-5）
url_max_concurrent = 3
# URL 下载队列最大长度
url_queue_maxsize = 200
# URL 单任务超时时间（秒，默认3600即1小时）
url_download_timeout = 3600
# TG 媒体下载最大并发数（推荐 2-5）
media_max_concurrent = 3
# TG 媒体下载队列最大长度
media_queue_maxsize = 200
# TG 媒体单任务超时时间（秒，默认1800即30分钟）
media_download_timeout = 1800

